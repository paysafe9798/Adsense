<!DOCTYPE html>
<html>
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CXBYESFNE4"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-CXBYESFNE4');
</script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog - Shani Store</title>
<meta name="description" content="Guides, tips, and updates about Free Fire emotes and the Shani Store Emote Panel.">

<style>
body{background:#000;color:white;font-family:sans-serif;line-height:1.7;}
.container{max-width:700px;margin:auto;padding:20px 20px 60px;}
h1{font-size:26px;margin-bottom:20px;}
.post-card{
background:#1e293b;border-radius:14px;padding:18px;margin-bottom:16px;
display:block;text-decoration:none;color:white;
}
.post-card h2{font-size:17px;margin:0 0 6px;color:#60a5fa;}
.post-card p{font-size:13.5px;color:#cbd5e1;margin:0 0 6px;}
.post-date{font-size:11px;color:#888;}
.nav{max-width:700px;margin:auto;padding:15px 20px 0;}
.nav a{color:#aaa;text-decoration:none;font-size:13px;margin-right:15px;}
.back-btn{
display:inline-block;margin-top:20px;padding:10px 18px;
border-radius:10px;background:#2563eb;color:white;
text-decoration:none;font-size:14px;
}
</style>
</head>
<body>

<div class="nav">
  <a href="/">Home</a>
  <a href="/blog">Blog</a>
  <a href="/about">About</a>
  <a href="/contact">Contact</a>
</div>

<div class="container">
<h1>Shani Store Blog</h1>

{% for post in posts %}
<a class="post-card" href="/blog/{{ post.slug }}">
  <h2>{{ post.title }}</h2>
  <p>{{ post.excerpt }}</p>
  <span class="post-date">{{ post.date }}</span>
</a>
{% endfor %}

<a class="back-btn" href="/">← Back to Emote Panel</a>
</div>

</body>
</html>
