let lastSendTime = {};

document.getElementById("team").addEventListener("input", function(){
  this.value = this.value.replace(/\D/g, "").slice(0,7);
});

function showToast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(() => { t.classList.remove("show"); }, 2000);
}

let allData = [];
let box = document.getElementById("buttons");
let limit = 20;

loadData();

function loadData(){
  fetch("/static/final_links.json")
  .then(res => res.json())
  .then(data => {
    allData = data.slice(0, limit);
    render();
  });
}

function render(){
  box.innerHTML = "";
  for(let item of allData){
    createCard(item.name, item.id, item.image);
  }
}

function createCard(name, id, imgUrl){
  let card = document.createElement("div");
  card.className = "card";
  let img = document.createElement("img");
  img.src = "https://via.placeholder.com/100x60?text=...";
  img.loading = "lazy";
  let realImg = new Image();
  realImg.src = imgUrl;
  realImg.onload = () => { img.src = realImg.src; img.classList.add("loaded"); };
  let nameDiv = document.createElement("div");
  nameDiv.innerText = name;
  let btn = document.createElement("button");
  btn.innerText = "Send";
  btn.onclick = () => { sendEmote(id, btn); };
  card.appendChild(img);
  card.appendChild(nameDiv);
  card.appendChild(btn);
  box.appendChild(card);
}

async function sendEmote(id, btn){
  let uid = document.getElementById("uid").value;
  let team = document.getElementById("team").value;
  if(!uid || !team){ showToast("Enter UID & Team Code"); return; }
  let now = Date.now() / 1000;
  if(lastSendTime[uid] && (now - lastSendTime[uid]) < 1){
    let wait = (1 - (now - lastSendTime[uid])).toFixed(1);
    showToast(`Please wait ${wait} seconds before sending again ⏱️`);
    return;
  }
  lastSendTime[uid] = now;
  let original = btn.innerText;
  btn.innerHTML = '<div class="spinner"></div>';
  btn.disabled = true;
  let noBot = document.getElementById("noBot").checked;
  try{
    let r = await fetch("/send", {
      method: "POST",
      headers: {"Content-Type": "application/x-www-form-urlencoded"},
      body: `uid=${uid}&team=${team}&emote=${id}&no_bot=${noBot}`
    });
    let d = await r.json();
    if(d.status === "success"){ btn.innerText = "✔ Sent"; btn.classList.add("success"); showToast("Success ✅"); }
    else if(d.status === "blocked") showToast("You are Blocked ❌");
    else if(d.status === "fail") showToast("Failed to send ❌");
    else showToast("Error ❌");
  } catch(e){ showToast("Server Error ❌"); }
  setTimeout(() => { btn.innerText = original; btn.disabled = false; btn.classList.remove("success"); }, 1500);
}

function loadMore(){
  limit += 50;
  loadData();
}
</script>
